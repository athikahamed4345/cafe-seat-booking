# ── Database ────────────────────────────────────────────────────────────────
# Local H2 (default). For cloud deployment, set DATABASE_URL env variable.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:../database/cafebook;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ── H2 console (local only) ──────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JSON ─────────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:CafeBookSecretKey2024SuperLongSecretForJWTAuthentication}
jwt.expiration=86400000

# ── Static files ─────────────────────────────────────────────────────────────
spring.web.resources.static-locations=file:../frontend/

# ── Email (SMTP) ─────────────────────────────────────────────────────────────
# Set spring.mail.enabled=true and fill in credentials to activate emails.
# Gmail: use an App Password (not your real password).
# SendGrid: host=smtp.sendgrid.net, username=apikey, password=<your-api-key>
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App base URL (used in reset-password email link) ─────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8080}
