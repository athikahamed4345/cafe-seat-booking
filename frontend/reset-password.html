<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CafeBook</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/index.html" class="logo">&#9749; CafeBook</a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <div id="main-nav"></div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <span class="auth-eyebrow">Set New Password</span>
      <div id="alert-box"></div>

      <div id="pane-form">
        <p style="font-size:0.88rem;color:#666;margin-bottom:1.2rem;line-height:1.5">
          Choose a new password for your CafeBook account.
        </p>
        <form id="reset-form">
          <div class="auth-field">
            <label>New Password</label>
            <input type="password" id="new-password" required placeholder="••••••••" minlength="6" autocomplete="new-password">
          </div>
          <div class="auth-field">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" required placeholder="••••••••" autocomplete="new-password">
          </div>
          <button class="btn-send" type="submit" id="reset-btn" style="margin-top:1.5rem">Update Password</button>
        </form>
      </div>

      <div id="pane-done" style="display:none;text-align:center;padding:1rem 0">
        <p style="font-size:2rem;margin-bottom:0.5rem">&#10003;</p>
        <p style="font-weight:600;margin-bottom:0.5rem">Password Updated!</p>
        <p style="font-size:0.88rem;color:#666;margin-bottom:1.5rem">You can now sign in with your new password.</p>
        <a href="/auth.html" class="btn btn-primary">Go to Sign In</a>
      </div>

      <div id="pane-error" style="display:none;text-align:center;padding:1rem 0">
        <p style="font-size:2rem;margin-bottom:0.5rem">&#10007;</p>
        <p style="font-weight:600;margin-bottom:0.5rem">Link Invalid or Expired</p>
        <p style="font-size:0.88rem;color:#666;margin-bottom:1.5rem">Reset links expire after 1 hour. Please request a new one.</p>
        <a href="/auth.html#forgot" onclick="event.preventDefault();location.href='/auth.html';sessionStorage.setItem('openForgot','1')"
           class="btn btn-primary">Request New Link</a>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script>
    renderNav(); renderFooter();

    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('pane-form').style.display  = 'none';
      document.getElementById('pane-error').style.display = 'block';
    }

    document.getElementById('reset-form').addEventListener('submit', async e => {
      e.preventDefault();
      const pw1 = document.getElementById('new-password').value;
      const pw2 = document.getElementById('confirm-password').value;
      if (pw1 !== pw2) {
        document.getElementById('alert-box').innerHTML =
          `<div class="auth-alert error">Passwords do not match.</div>`;
        return;
      }
      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Updating…';
      document.getElementById('alert-box').innerHTML = '';
      try {
        await api.auth.resetPassword(token, pw1);
        document.getElementById('pane-form').style.display = 'none';
        document.getElementById('pane-done').style.display = 'block';
      } catch(err) {
        document.getElementById('pane-form').style.display  = 'none';
        document.getElementById('pane-error').style.display = 'block';
      }
    });

    // If redirected from auth.html to open forgot tab
    if (sessionStorage.getItem('openForgot')) {
      sessionStorage.removeItem('openForgot');
    }
  </script>
</body>
</html>
